name: Feature Request
description: AI Agent가 처리할 기능 요청을 작성합니다.
title: "[Feature] "
labels: ["plan"]
body:
  - type: markdown
    attributes:
      value: |
        이 이슈는 Planner Agent의 입력으로 사용됩니다.
        명확하게 작성할수록 더 좋은 TASK가 생성됩니다.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: 이 기능으로 달성하고자 하는 목표를 한 문장으로 작성하세요.
      placeholder: "예: GitHub Issue가 생성되면 Webhook으로 이벤트를 수신하고 저장한다."
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 이 기능이 필요한가요?
      placeholder: "예: GitHub Actions에서 Issue 이벤트를 감지하려면 서버가 Webhook을 수신할 수 있어야 한다."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 이번 기능에서 포함되는 것과 포함되지 않는 것을 구분해서 작성하세요.
      placeholder: |
        In Scope:
        - Webhook endpoint 생성
        - Event payload 저장

        Out of Scope:
        - AI Agent 호출
        - Event 처리 로직
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: 기능이 완료되었다고 판단할 수 있는 측정 가능한 조건을 작성하세요.
      placeholder: |
        - POST /webhook/github 호출 시 200 OK 반환
        - Payload가 저장됨
        - 로그에 Event ID가 출력됨
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Roadmap Phase
      description: 이 기능이 해당하는 Phase를 선택하세요.
      options:
        - Phase 1 - GitHub Webhook 수신
        - Phase 2 - Planner Agent
        - Phase 3 - Architect Agent
        - Phase 4 - Implementer Agent
        - Phase 5 - Reviewer Agent
        - Phase 6 - Pull Request 자동 생성
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (Optional)
      description: 추가 참고사항이 있다면 작성하세요.
