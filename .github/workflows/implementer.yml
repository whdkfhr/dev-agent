name: Implementer Agent

on:
  issues:
    types: [labeled]

jobs:
  implementer:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'implement'
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Implementer Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python .github/scripts/run_implementer.py

      - name: Commit generated code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/
          git diff --staged --quiet || git commit -m "feat: implement TASK-${{ github.event.issue.number }} by Implementer Agent [skip ci]"
          git push

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat: TASK-${{ github.event.issue.number }} - ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          Generated by Implementer Agent.

          ## Summary
          - TASK: docs/tasks/TASK-${{ github.event.issue.number }}.md
          - DESIGN: docs/design/DESIGN-${{ github.event.issue.number }}.md
          " \
            --base develop \
            --label "review"
